name: Vercel Preview Deployment
# Este workflow es OPCIONAL - Vercel ya hace deploy automático desde su dashboard

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  preview:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_WEBSOCKET_URL: ${{ vars.VITE_WEBSOCKET_URL }}
          VITE_ROUTER_MODE: ${{ vars.VITE_ROUTER_MODE }}
          VITE_CLOUDINARY_URL: ${{ vars.VITE_CLOUDINARY_URL }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ vars.VITE_CLOUDINARY_UPLOAD_PRESET }}

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Build completed successfully! Vercel will deploy this automatically.'
            })

